<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Share Link - video receiver</title>
  <link rel="stylesheet" href="/video/style.css">
</head>
<body>

  <!-- Teams Header -->
  <header class="teams-header">
    <div class="teams-logo">
      <div class="teams-logo-icon">V</div>
      <span>Teams Video Link</span>
    </div>
  </header>

  <!-- Main Container -->
  <main class="setup-container">
    <div class="setup-card">
      <h1 class="setup-title">Watch shared webcam</h1>
      <p id="status" class="setup-subtitle" style="margin-bottom: 25px;">Connecting to the sender...</p>
      
      <video id="remoteVideo" autoplay playsinline style="width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 8px; border: 1px solid var(--border-color);"></video>
    </div>
  </main>

  <script th:inline="javascript">
    window.shareLinkRoom = /*[[${room}]]*/ "";
  </script>
  <script src="/video/receiver.js"></script>
</body>
</html>
