<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Share Link - data receiver</title>
  <link rel="stylesheet" href="/data/style.css">
</head>
<body>

  <!-- Teams Header -->
  <header class="teams-header">
    <div class="teams-logo">
      <div class="teams-logo-icon">D</div>
      <span>Teams Data Link</span>
    </div>
  </header>

  <!-- Main Container -->
  <main class="setup-container">
    <div class="setup-card">
      <h1 class="setup-title">Download shared file</h1>
      <p id="status" class="setup-subtitle" style="margin-bottom: 25px;">Connecting to the sender...</p>
      <div id="download" style="margin-top: 15px;"></div>
    </div>
  </main>

  <script th:inline="javascript">
    window.shareLinkRoom = /*[[${room}]]*/ "";
  </script>
  <script src="/data/receiver.js"></script>
</body>
</html>
