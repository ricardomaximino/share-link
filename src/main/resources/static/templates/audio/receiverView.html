<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Share Link - audio receiver</title>
  <link rel="stylesheet" href="/audio/style.css">
</head>
<body>

  <!-- Teams Header -->
  <header class="teams-header">
    <div class="teams-logo">
      <div class="teams-logo-icon">A</div>
      <span>Teams Audio Link</span>
    </div>
  </header>

  <!-- Main Container -->
  <main class="setup-container">
    <div class="setup-card">
      <h1 class="setup-title">Listen to shared microphone</h1>
      <p id="status" class="setup-subtitle" style="margin-bottom: 25px;">Connecting to the sender...</p>
      
      <audio id="remoteAudio" autoplay controls style="width: 100%; margin-top: 15px; border-radius: 8px; outline: none;"></audio>
    </div>
  </main>

  <script th:inline="javascript">
    window.shareLinkRoom = /*[[${room}]]*/ "";
  </script>
  <script src="/audio/receiver.js"></script>
</body>
</html>
