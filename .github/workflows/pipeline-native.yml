# Java CI/CD with Maven DockerHub Google Artifact Registry and Google Cloud Run
name: Java CI/CD

on:
  push:
    branches: [ "native" ]
  pull_request:
    branches: [ "native" ]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  CLOUD_RUN_SERVICE: ${{ secrets.CLOUD_RUN_SERVICE_NAME }}
  ARTIFACT_REGISTRY_REPO: ${{ secrets.ARTIFACT_REGISTRY_REPO }}
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_IMAGE_NAME: ricardomaximino/share-link:latest
  IMAGE_NAME: share-link

jobs:
  build:

    runs-on: ubuntu-latest
    environment:
      name: google
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: graalvm/setup-graalvm@v1
      with:
        java-version: '25'
        distribution: 'graalvm'
        cache: maven
    - name: Build with Maven
      run: mvn compile
    - name: Test with Maven
      run: mvn test
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Pull image from Docker Hub
      run: docker pull ${DOCKERHUB_IMAGE_NAME}

    - name: Authenticate to Google Cloud
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up gcloud CLI
      uses: 'google-github-actions/setup-gcloud@v2'
      with:
        project_id: ${{ env.PROJECT_ID }}

    - name: Configure Docker to use Google Artifact Registry
      run: gcloud auth configure-docker ${REGION}-docker.pkg.dev

    - name: Tag and Push Docker Image to Google Artifact Registry
      run: |
        # The full image name for Artifact Registry
        FULL_GCR_IMAGE=${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REGISTRY_REPO}/${IMAGE_NAME}:latest
        docker tag ${DOCKERHUB_IMAGE_NAME} $FULL_GCR_IMAGE
        docker push $FULL_GCR_IMAGE
        
        # Make the full image name available for the next step
        echo "FULL_GCR_IMAGE=$FULL_GCR_IMAGE" >> $GITHUB_ENV

    - name: Deploy to Google Cloud Run
      uses: google-github-actions/deploy-cloudrun@v2
      with:
        service: ${{ env.CLOUD_RUN_SERVICE }}
        region: ${{ env.REGION }}
        image: ${{ env.FULL_GCR_IMAGE }}
