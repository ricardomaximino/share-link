# Java CI/CD with Maven DockerHub Google Artifact Registry and Google Cloud Run
name: Java CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", ",master" ]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  CLOUD_RUN_SERVICE: ${{ secrets.CLOUD_RUN_SERVICE_NAME }}
  ARTIFACT_REGISTRY_REPO: ${{ secrets.ARTIFACT_REGISTRY_REPO }}
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_NAME: share-link-non-native
  IMAGE_TAG: latest
  APP_NAME: target/share-link-0.0.1-SNAPSHOT.jar

jobs:
  build:

    runs-on: ubuntu-latest
    environment:
      name: google
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 25
      uses: graalvm/setup-graalvm@v1
      with:
        java-version: '25'
        distribution: 'graalvm'
        cache: maven
    - name: Build with Maven
      run: mvn package

    - name: Build the Docker image
      run: docker build . --file docker/Dockerfile-NonNative --tag ${DOCKERHUB_USERNAME}/${IMAGE_NAME}:${IMAGE_TAG}  --build-arg  NAME=${APP_NAME}

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Push image to Docker Hub
      run: docker push ${DOCKERHUB_USERNAME}/${IMAGE_NAME}:${IMAGE_TAG}